<svg width="960" height="650" viewBox="0 0 960 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace; }
      .blink { animation: blink 1.1s steps(1,end) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    </style>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="winClip">
      <rect x="30" y="30" width="900" height="570" rx="18"/>
    </clipPath>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="480" cy="315" rx="380" ry="220" fill="#2ea043" opacity="0.08" filter="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="30" y="30" width="900" height="570" rx="18" fill="#0b0f14"/>

    <g clip-path="url(#winClip)">
      <!-- title bar -->
      <rect x="30" y="30" width="900" height="46" fill="#11161d"/>
      <line x1="30" y1="76" x2="930" y2="76" stroke="#ffffff" stroke-opacity="0.06"/>

      <circle cx="58" cy="53" r="6" fill="#ff5f57"/>
      <circle cx="78" cy="53" r="6" fill="#febc2e"/>
      <circle cx="98" cy="53" r="6" fill="#28c840"/>

      <path d="M122 42 h8 l3 4 h13 a2 2 0 0 1 2 2 v9 a2 2 0 0 1 -2 2 h-24 a2 2 0 0 1 -2 -2 v-13 a2 2 0 0 1 2 -2 z" fill="#5b6270"/>
      <text x="176" y="57" font-size="13" fill="#8b949e">portfolio-site — build log</text>

      <!-- row 1: command -->
      <text x="62" y="114" font-size="13.5"><tspan fill="#3fb950">$</tspan><tspan fill="#e6edf3"> npm install next react react-dom</tspan></text>
      <text x="898" y="114" font-size="12.5" text-anchor="end"><tspan fill="#3fb950">✓ done</tspan><tspan fill="#6e7681">  ·  22ms</tspan></text>

      <!-- row 2: stdout -->
      <text x="62" y="140" font-size="12" fill="#6e7681">STDOUT   added 3 packages, audited 312 packages in 1s</text>

      <!-- row 3: patch file header -->
      <text x="62" y="174" font-size="13"><tspan fill="#58a6ff">✎</tspan><tspan fill="#e6edf3" font-weight="600">  Patch File</tspan><tspan fill="#6e7681">   package.json</tspan></text>
      <text x="898" y="174" font-size="12.5" text-anchor="end"><tspan fill="#3fb950">+4</tspan><tspan fill="#6e7681">  </tspan><tspan fill="#f85149">-1</tspan></text>

      <!-- diff card -->
      <rect x="62" y="188" width="836" height="262" rx="8" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.06"/>
      <rect x="68" y="275" width="824" height="20" fill="#f85149" fill-opacity="0.12"/>
      <rect x="68" y="295" width="824" height="80" fill="#3fb950" fill-opacity="0.10"/>

      <text x="76" y="210" font-size="12.5" fill="#c9d1d9">{</text>
      <text x="76" y="230" font-size="12.5" fill="#c9d1d9">  "name": "portfolio-site",</text>
      <text x="76" y="250" font-size="12.5" fill="#c9d1d9">  "main": "index.js",</text>
      <text x="76" y="270" font-size="12.5" fill="#c9d1d9">  "scripts": {</text>
      <text x="76" y="290" font-size="12.5" fill="#f85149">-   "test": "echo \"Error: no test specified\" &amp;&amp; exit 1",</text>
      <text x="76" y="310" font-size="12.5" fill="#3fb950">+   "dev": "next dev",</text>
      <text x="76" y="330" font-size="12.5" fill="#3fb950">+   "build": "next build",</text>
      <text x="76" y="350" font-size="12.5" fill="#3fb950">+   "start": "next start",</text>
      <text x="76" y="370" font-size="12.5" fill="#3fb950">+   "lint": "next lint"</text>
      <text x="76" y="390" font-size="12.5" fill="#c9d1d9">  },</text>
      <text x="76" y="410" font-size="12.5" fill="#c9d1d9">  "keywords": []</text>
      <text x="76" y="430" font-size="12.5" fill="#c9d1d9">}</text>

      <!-- row: patch applied -->
      <text x="62" y="474" font-size="12.5"><tspan fill="#3fb950">✓ done</tspan><tspan fill="#6e7681">  ·  2ms   Patch applied successfully to package.json</tspan></text>

      <!-- row: view directory -->
      <path d="M62 493 h8 l3 4 h13 a2 2 0 0 1 2 2 v9 a2 2 0 0 1 -2 2 h-24 a2 2 0 0 1 -2 -2 v-13 a2 2 0 0 1 2 -2 z" fill="#8b949e"/>
      <text x="98" y="504" font-size="13"><tspan fill="#e6edf3">View Directory</tspan><tspan fill="#6e7681">   portfolio-site</tspan></text>

      <!-- row: package-lock -->
      <text x="62" y="534" font-size="12.5"><tspan fill="#3fb950">✓ done</tspan><tspan fill="#6e7681">  ·  195ms   package-lock.json created</tspan></text>

    </g>

    <rect x="30" y="30" width="900" height="570" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
</svg>
